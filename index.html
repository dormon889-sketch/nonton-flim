<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NontonPro - Viral Streaming Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: 'Inter', sans-serif; }
        .video-card { border: 1px solid #1a1a1a; border-radius: 1rem; overflow: hidden; background: #0a0a0a; position: relative; }
        .nav-glass { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #1a1a1a; }
        .btn-download { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } }
        
        /* Thumbnail Overlay */
        .thumb-overlay { position: absolute; inset: 0; background: #111; display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer; }
        .play-button { width: 60px; height: 60px; background: rgba(239, 68, 68, 0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body onclick="spawnAds()">

    <nav class="nav-glass sticky top-0 z-50 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-red-600 rounded-full"></div>
                <span class="text-xl font-black uppercase tracking-tighter">Nonton<span class="text-red-600">Pro</span></span>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

            <div class="video-card" id="card-1">
                <div class="aspect-video relative">
                    <div class="thumb-overlay" onclick="playVideo(1, 'https://drive.google.com/file/d/1I7eHDS27C_ifBxbiKv7Uxu64Ksk6NQDi/preview')">
                        <div class="play-button">
                            <svg class="w-8 h-8 fill-white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                    <div id="player-1" class="w-full h-full hidden"></div>
                </div>
                <div class="p-5">
                    <h2 class="font-bold mb-3 h-12">Kakak sedang tidur</h2>
                    <button onclick="spawnAds()" class="btn-download block w-full bg-red-600 text-center py-2 rounded-lg text-xs font-black uppercase">Download Full HD</button>
                </div>
            </div>

            <div class="video-card">
                <div class="aspect-video relative">
                    <div class="thumb-overlay" onclick="playVideo(2, 'https://drive.google.com/file/d/1IPRQ1py2Uq7e0CrjWg2gUbFTLeKb-z13/preview')">
                        <div class="play-button">
                            <svg class="w-8 h-8 fill-white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                    <div id="player-2" class="w-full h-full hidden"></div>
                </div>
                <div class="p-5">
                    <h2 class="font-bold mb-3 h-12">Main sama pacar</h2>
                    <button onclick="spawnAds()" class="btn-download block w-full bg-red-600 text-center py-2 rounded-lg text-xs font-black uppercase">Download Full HD</button>
                </div>
            </div>

            </div>
    </main>

    <script type='text/javascript' src='https://pl27572643.profitablecpmratenetwork.com/ea/6e/4c/ea6e4c911e058aa49aa126e84efd510f.js'></script>
    <script type='text/javascript' src='https://pl29087423.profitablecpmratenetwork.com/a4/51/b9/a451b91f1c128d7be8d3af05be04263c.js'></script>

    <script>
        // Link Direct Iklan Anda (Ganti dengan link dari Adsterra/Monetag)
        const adLink = "https://www.effectivegatecpm.com/z6je137z10?key=b30ca5126031be538c337852e802cf8c";

        // Fungsi memunculkan iklan bertubi-tubi
        function spawnAds() {
            // Membuka 3 Tab iklan sekaligus saat diklik
            window.open(adLink, '_blank');
            window.open(adLink, '_blank');
            window.open(adLink, '_blank');
        }

        // Fungsi Play Video + Iklan
        function playVideo(id, url) {
            // Munculkan iklan dulu 3 kali
            spawnAds();
            
            // Sembunyikan thumbnail, munculkan iframe
            const thumb = document.querySelectorAll('.thumb-overlay')[id-1];
            const player = document.getElementById('player-' + id);
            
            thumb.classList.add('hidden');
            player.classList.remove('hidden');
            player.innerHTML = `<iframe class="w-full h-full" src="${url}&autoplay=1" frameborder="0" allowfullscreen allow="autoplay"></iframe>`;
        }
    </script>
</body>
                                </html>
