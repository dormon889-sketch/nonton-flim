<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NontonPro - Video Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; cursor: pointer; }
        .video-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
        .player-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
        
        /* Overlay Transparan untuk Menangkap Klik Pertama */
        .click-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 20; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .play-icon { 
            width: 60px; height: 60px; background: rgba(220, 38, 38, 0.9); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #fff;
        }
        .play-icon svg { width: 30px; height: 30px; fill: #fff; margin-left: 4px; }

        iframe { width: 100%; height: 100%; border: none; }
        .btn-dl { 
            background: #e11d48; text-align: center; padding: 12px; border-radius: 8px; 
            font-weight: 800; animation: pulse 2s infinite; display: block; margin-top: 10px;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body onclick="forcePop()">

    <nav class="p-4 border-b border-gray-900 sticky top-0 bg-black z-50 flex items-center gap-2">
        <div class="w-8 h-8 bg-red-600 rounded-full"></div>
        <span class="text-xl font-black uppercase">Nonton<span class="text-red-600">Pro</span></span>
    </nav>

    <main class="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="video-grid"></main>

    <script type='text/javascript' src='https://pl27572643.profitablecpmratenetwork.com/ea/6e/4c/ea6e4c911e058aa49aa126e84efd510f.js'></script>

    <script>
        const adLink = "https://www.effectivegatecpm.com/z6je137z10?key=b30ca5126031be538c337852e802cf8c";
        
        // Daftar Video Tanpa URL Gambar Manual
        const videos = [
            { id: '1IZViAiUwWvdxEzPuCEc4faUe7XQdUmQO', title: 'Talent' },
            { id: '1INUm36q7soW7LMX2uEJsJYO0iP7uWty3', title: 'Tersesat di hutan' },
            { id: '1IPRQ1py2Uq7e0CrjWg2gUbFTLeKb-z13', title: 'Main sama pacar' },
            { id: '1I180v5SSSHiks7D5lhafMi0PRCL1-r-j', title: 'Bermain di kebun sawit' },
            { id: '1I7eHDS27C_ifBxbiKv7Uxu64Ksk6NQDi', title: 'Kakak sedang tidur' },
            { id: '1IPqB--LEhRa8CITuhcpld0f2mYk_0Sbu', title: 'ITSANGGI' },
            { id: '1IYSztuITP3XepdENpGWS9EjkcYOKV4S2', title: 'Hijab joget' },
            { id: '1IC48a1NkUmBKXMhDRVCDcoCt9htdZCjJ', title: 'Temen jahil' },
            { id: '1IIO-x_pwONk2QHmiSV29JCKvPZ_nQm1P', title: 'Bule vs Gojek' }
        ];

        const grid = document.getElementById('video-grid');
        videos.forEach(vid => {
            grid.innerHTML += `
                <div class="video-card">
                    <div class="player-container">
                        <iframe src="https://drive.google.com/file/d/${vid.id}/preview"></iframe>
                        
                        <div class="click-overlay" onclick="handleInitialClick(this)">
                            <div class="play-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
                        </div>
                    </div>
                    <div class="p-4">
                        <h2 class="font-bold mb-2 text-sm">${vid.title}</h2>
                        <div onclick="triplePop()" class="btn-dl text-xs">DOWNLOAD FULL HD</div>
                    </div>
                </div>
            `;
        });

        // 3 Iklan Sekaligus
        function triplePop() {
            window.open(adLink, '_blank');
            setTimeout(() => { window.open(adLink, '_blank'); }, 1000);
            setTimeout(() => { window.open(adLink, '_blank'); }, 2000);
        }

        // Iklan Background
        function forcePop() {
            if(!window.isPopped) {
                window.open(adLink, '_blank');
                window.isPopped = true;
                setTimeout(() => { window.isPopped = false; }, 8000);
            }
        }

        // Logika Klik: Hapus Overlay & Munculkan Iklan
        function handleInitialClick(overlay) {
            triplePop(); // Munculkan 3 iklan
            overlay.remove(); // Hapus penghalang agar video bisa diklik/diputar langsung
        }
    </script>
</body>
</html>
