<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NontonPro - Hub Video Viral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .video-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 12px; overflow: hidden; transition: 0.3s; }
        .video-card:hover { border-color: #ef4444; transform: translateY(-5px); }
        
        /* Thumbnail dengan Gambar Anda */
        .thumb-box { 
            position: relative; width: 100%; aspect-ratio: 16/9; 
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        /* Tombol Play Besar */
        .play-btn { 
            width: 65px; height: 65px; background: rgba(220, 38, 38, 0.9); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            border: 2px solid #fff; z-index: 10; transition: 0.3s;
        }
        .play-btn svg { width: 30px; height: 30px; fill: #fff; margin-left: 4px; }
        
        /* Iklan Mengambang (Sesuai Gambar 1000746123.jpg) */
        .floating-ad {
            position: absolute; top: 10px; right: 10px; left: 10px;
            background: rgba(17, 17, 17, 0.95); border: 1px solid #333;
            border-radius: 8px; padding: 10px; z-index: 40; display: flex; align-items: center; gap: 10px;
        }

        .btn-dl { 
            background: linear-gradient(90deg, #e11d48, #be123c); 
            text-align: center; padding: 14px; border-radius: 8px; 
            font-weight: 900; cursor: pointer; animation: pulse 1.5s infinite; 
            display: block; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        iframe { width: 100%; height: 100%; position: absolute; top: 0; left: 0; background: #000; }
    </style>
</head>
<body onclick="spawnGlobalAd()">

    <nav class="p-4 border-b border-gray-900 sticky top-0 bg-black/90 backdrop-blur-md z-50 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-red-600 rounded-full shadow-[0_0_15px_rgba(220,38,38,0.5)]"></div>
            <span class="text-xl font-black uppercase tracking-tight">Nonton<span class="text-red-600">Pro</span></span>
        </div>
    </nav>

    <main class="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="video-grid"></main>

    <script type='text/javascript' src='https://pl27572643.profitablecpmratenetwork.com/ea/6e/4c/ea6e4c911e058aa49aa126e84efd510f.js'></script>

    <script>
        const adLink = "https://www.effectivegatecpm.com/z6je137z10?key=b30ca5126031be538c337852e802cf8c";
        
        const videos = [
            { id: '1IZViAiUwWvdxEzPuCEc4faUe7XQdUmQO', title: 'Talent - Viral Tiktok', thumb: 'https://i.ibb.co.com/p6D11Tb5/IMG-20260409-094536.jpg' },
            { id: '1INUm36q7soW7LMX2uEJsJYO0iP7uWty3', title: 'Tersesat di hutan (HD)', thumb: 'https://i.ibb.co.com/MDj8Zfvk/Screenshot.jpg' },
            { id: '1IPRQ1py2Uq7e0CrjWg2gUbFTLeKb-z13', title: 'Main sama pacar di rumah', thumb: 'https://i.ibb.co.com/JjTXwgVB/Screenshot.jpg' },
            { id: '1I180v5SSSHiks7D5lhafMi0PRCL1-r-j', title: 'Bermain di kebun sawit siang bolong', thumb: 'https://i.ibb.co.com/tpbk40N8/Screenshot.jpg' },
            { id: '1I7eHDS27C_ifBxbiKv7Uxu64Ksk6NQDi', title: 'Kakak sedang tidur pulas', thumb: 'https://i.ibb.co.com/1Y5k9pPp/Screenshot.jpg' },
            { id: '1IPqB--LEhRa8CITuhcpld0f2mYk_0Sbu', title: 'ITSANGGI - Part 1', thumb: 'https://i.ibb.co.com/fzFkwffx/Screenshot.jpg' },
            { id: '1IYSztuITP3XepdENpGWS9EjkcYOKV4S2', title: 'Hijab joget heboh', thumb: 'https://i.ibb.co.com/PsfrYKQL/Screenshot.jpg' },
            { id: '1IC48a1NkUmBKXMhDRVCDcoCt9htdZCjJ', title: 'Temen jahil di kamar', thumb: 'https://i.ibb.co.com/HL8TFrQS/Screenshot.jpg' },
            { id: '1IIO-x_pwONk2QHmiSV29JCKvPZ_nQm1P', title: 'Bule vs Gojek (Viral)', thumb: 'https://i.ibb.co.com/G4DhJrfb/Screenshot.jpg' }
        ];

        const grid = document.getElementById('video-grid');
        videos.forEach(vid => {
            grid.innerHTML += `
                <div class="video-card">
                    <div class="thumb-box" style="background-image: url('${vid.thumb}')" onclick="handlePlay(this, '${vid.id}')">
                        <div class="floating-ad" id="ad-box">
                            <div class="w-10 h-10 bg-red-600 rounded flex items-center justify-center text-[10px] font-bold">ADS</div>
                            <div class="flex-1">
                                <p class="text-[10px] font-bold text-red-500">AdZilla Alert!</p>
                                <p class="text-[9px]">Click to watch Full HD</p>
                            </div>
                            <button class="text-[10px] text-gray-400">Hide</button>
                        </div>
                        <div class="play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
                    </div>
                    <div class="p-4">
                        <h2 class="font-bold mb-2 h-10 text-sm overflow-hidden">${vid.title}</h2>
                        <div onclick="triplePop()" class="btn-dl text-xs">DOWNLOAD FULL HD</div>
                    </div>
                </div>
            `;
        });

        function spawnGlobalAd() {
            // Memastikan iklan muncul saat pengunjung klik area kosong manapun
            if(!window.adTriggered) {
                window.open(adLink, '_blank');
                window.adTriggered = true;
                setTimeout(() => { window.adTriggered = false; }, 5000);
            }
        }

        function triplePop() {
            window.open(adLink, '_blank'); 
            setTimeout(() => { window.open(adLink, '_blank'); }, 1000); 
            setTimeout(() => { window.open(adLink, '_blank'); }, 2200); 
        }

        let clickState = {};
        function handlePlay(container, id) {
            if (!clickState[id]) {
                triplePop(); // Klik 1: Ledakkan iklan
                clickState[id] = true;
            } else {
                // Klik 2: Jalankan video
                container.innerHTML = `<iframe src="https://drive.google.com/file/d/${id}/preview" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
            }
        }
    </script>
</body>
</html>
