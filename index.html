<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NontonPro - Premium Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .video-card { background: #0f0f0f; border: 1px solid #222; border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
        .player-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; }
        
        /* ELITE OVERLAY: Menutup seluruh layar secara transparan */
        #global-ad-layer { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 9999; cursor: pointer; display: block;
        }

        iframe { width: 100%; height: 100%; border: none; }
        .btn-dl { 
            background: linear-gradient(90deg, #e11d48, #be123c); text-align: center; 
            padding: 12px; border-radius: 8px; font-weight: 800; cursor: pointer;
        }

        /* Animasi Status */
        #status-bar { transition: 0.5s; font-size: 10px; font-weight: bold; }
        .cooldown { color: #facc15; }
        .ready { color: #22c55e; }
    </style>
    
    <script src="https://pl27572643.profitablecpmratenetwork.com/ea/6e/4c/ea6e4c911e058aa49aa126e84efd510f.js"></script>
    <script src="https://pl27571947.profitablecpmratenetwork.com/59/86/ee/5986ee49c4f8f3d6318fd610625f4391.js"></script>
</head>
<body id="app-body">

    <div id="global-ad-layer" onclick="executeTripleStrike()"></div>

    <nav class="p-4 border-b border-gray-800 bg-black sticky top-0 z-[10000] flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-red-600 rounded-full shadow-[0_0_10px_#dc2626]"></div>
            <span class="text-xl font-black tracking-tighter uppercase">Nonton<span class="text-red-600">Pro</span></span>
        </div>
        <div id="status-bar" class="ready">ENGINE READY</div>
    </nav>

    <main class="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="video-grid"></main>

    <script>
        const MONETAG = "https://omg10.com/4/10330271";
        const ADSTERRA_SMART = "https://www.profitablecpmratenetwork.com/z6je137z10?key=b30ca5126031be538c337852e802cf8c";
        
        let isWaiting = false;
        const JEDA_WAKTU = 4000; // Jeda 4 detik agar aman dari ban

        const doodVideos = [
            { id: '3vlfwbye4rxi', title: 'Video Premium 1' },
            { id: 'vrk7wo3kwah6', title: 'Video Premium 2' },
            { id: 'c5m5bcbdhdf4', title: 'Video Premium 3' },
            { id: 'gdbtns2obtwm', title: 'Video Premium 4' },
            { id: 'mcvgfvp1l46c', title: 'Video Premium 5' },
            { id: 's0s53txhao48', title: 'Video Premium 6' },
            { id: 'evz7qptnuln2', title: 'Video Premium 7' },
            { id: '94l57380dwei', title: 'Video Premium 8' },
            { id: 'hfh9obusf70t', title: 'Video Premium 9' },
            { id: 'i4uacwdd91ev', title: 'Video Premium 10' },
            { id: 'vurmomqty1a6', title: 'Video Premium 11' }
        ];

        const grid = document.getElementById('video-grid');
        doodVideos.forEach(vid => {
            grid.innerHTML += `
                <div class="video-card">
                    <div class="player-container">
                        <iframe src="https://dood.li/e/${vid.id}" allowfullscreen="true"></iframe>
                    </div>
                    <div class="p-4">
                        <h2 class="font-bold text-sm mb-3 text-gray-200">${vid.title}</h2>
                        <div class="btn-dl text-xs">DOWNLOAD FULL HD (FREE)</div>
                    </div>
                </div>
            `;
        });

        // LOGIKA TRIPLE STRIKE MAKSIMAL
        function executeTripleStrike() {
            if (isWaiting) return;

            // Membuka 3 Tap sekaligus dengan urutan paling cuan
            window.open(MONETAG, '_blank'); // Tap 1: Monetag (High CPM)
            setTimeout(() => { window.open(MONETAG, '_blank'); }, 200); // Tap 2: Monetag (Double Revenue)
            setTimeout(() => { window.open(ADSTERRA_SMART, '_blank'); }, 400); // Tap 3: Adsterra (Smartlink)

            // Jalankan sistem jeda
            startCooldown();
        }

        function startCooldown() {
            isWaiting = true;
            const layer = document.getElementById('global-ad-layer');
            const status = document.getElementById('status-bar');

            // Sembunyikan layer iklan sementara agar user bisa klik video asli
            layer.style.display = 'none';
            status.innerText = "COOLING DOWN...";
            status.className = "cooldown";

            setTimeout(() => {
                isWaiting = false;
                layer.style.display = 'block'; // Pasang lagi jaring iklannya
                status.innerText = "ENGINE READY";
                status.className = "ready";
            }, JEDA_WAKTU);
        }
    </script>
</body>
</html>
